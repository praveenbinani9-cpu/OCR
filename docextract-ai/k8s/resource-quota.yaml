apiVersion: v1
kind: Namespace
metadata:
  name: docextract
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: docextract-quota
  namespace: docextract
spec:
  hard:
    requests.cpu: "40"
    requests.memory: "80Gi"
    limits.cpu: "80"
    limits.memory: "160Gi"
    pods: "60"
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: docextract-limits
  namespace: docextract
spec:
  limits:
    - type: Container
      default:
        cpu: "1000m"
        memory: "2Gi"
      defaultRequest:
        cpu: "200m"
        memory: "512Mi"
