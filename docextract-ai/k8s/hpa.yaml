apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: docextract-api-hpa
  namespace: docextract
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: docextract-api
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
    - type: Resource
      resource:
        name: memory
        target: { type: Utilization, averageUtilization: 80 }
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: docextract-worker-hpa
  namespace: docextract
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: docextract-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 75 }
