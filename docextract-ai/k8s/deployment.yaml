apiVersion: apps/v1
kind: Deployment
metadata:
  name: docextract-api
  namespace: docextract
  labels: { app: docextract, component: api }
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels: { app: docextract, component: api }
  template:
    metadata:
      labels: { app: docextract, component: api }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/api/v1/metrics"
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/docextract-api:1.0.0
          ports: [{ containerPort: 8000 }]
          envFrom:
            - configMapRef: { name: docextract-config }
            - secretRef:    { name: docextract-secrets }
          resources:
            requests: { cpu: "500m",  memory: "1Gi" }
            limits:   { cpu: "2000m", memory: "4Gi" }
          readinessProbe:
            httpGet: { path: /api/v1/health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/v1/health, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docextract-worker
  namespace: docextract
  labels: { app: docextract, component: worker }
spec:
  replicas: 2
  selector:
    matchLabels: { app: docextract, component: worker }
  template:
    metadata:
      labels: { app: docextract, component: worker }
    spec:
      containers:
        - name: worker
          image: ghcr.io/your-org/docextract-worker:1.0.0
          envFrom:
            - configMapRef: { name: docextract-config }
            - secretRef:    { name: docextract-secrets }
          resources:
            requests: { cpu: "500m",  memory: "1Gi" }
            limits:   { cpu: "2000m", memory: "4Gi" }
