worker_processes auto;
events { worker_connections 4096; }

http {
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    client_max_body_size 30m;

    # Rate limit zones
    limit_req_zone $binary_remote_addr zone=api_rl:10m rate=120r/m;
    limit_req_zone $binary_remote_addr zone=extract_rl:10m rate=60r/m;

    upstream docextract_api {
        server api:8000;
    }

    map $http_x_forwarded_proto $real_scheme {
        default $scheme;
        https   https;
    }

    server {
        listen 80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate     /etc/nginx/tls/fullchain.pem;
        ssl_certificate_key /etc/nginx/tls/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location /api/v1/extract {
            limit_req zone=extract_rl burst=20 nodelay;
            proxy_pass http://docextract_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_read_timeout 120s;
            proxy_request_buffering off;
        }

        location /api/ {
            limit_req zone=api_rl burst=40 nodelay;
            proxy_pass http://docextract_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $real_scheme;
            proxy_read_timeout 60s;
        }

        location = /healthz {
            proxy_pass http://docextract_api/api/v1/health;
        }
    }
}
